specVersion: "4.0"
metadata:
  name: zscm.ewm.pickcarts1
type: application
framework:
  name: SAPUI5
  version: 1.136.1
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.ui.comp
    - name: sap.f
    - name: sap.ui.generic.app
    - name: sap.ui.table
    - name: sap.ushell
    - name: themelib_sap_bluecrystal
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /sap
            url: http://scm-s4hana01.mscg.local.npp:8001
            client: "100"
            destination: aa-s4h-100-pp
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: zscm.ewm.pickcarts1
        ui5Theme: sap_horizon
