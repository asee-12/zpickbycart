# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zscm.ewm.pickcarts1
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S4HANA_DS4
          url: http://vhdhbds4ci.sap.dandh.net:44300
          client: '100'
        app:
          name: ZEM_DH_CUSTPBC
          description: Custom D&H Pick by Cart
          package: ZEM_DI185
          transport: DS4K903274
        exclude:
          - /test/
          - /localService/
