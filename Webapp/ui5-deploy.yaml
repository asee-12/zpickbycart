# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zscm.ewm.pickcarts1
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: aa-s4h-100-pp
          url: http://scm-s4hana01.mscg.local.npp:8001
          client: '100'
        app:
          name: ZEWM_DH_CUSTPBC
          description: Custom D&H Pick by Cart
          package: ZDANDH_PICKBYCART
          transport: S4HK900977
        exclude:
          - /test/
          - /localService/
