specVersion: "4.0"
metadata:
  name: scm.ewm.pickcarts1
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /sap
            url: http://scm-s4hana01.mscg.local.npp:8001
            client: "100"
            destination: aa-s4h-100-pp
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: scm.ewm.pickcarts1
        ui5Theme: sap_horizon
